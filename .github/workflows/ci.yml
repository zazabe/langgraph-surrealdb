name: ci

on:
  push:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Run linting
        run: |
          uv sync --frozen
          uv run black --fast --check .
          uv run ruff check .
          uv run ty check .

  test:
    name: Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      SURREAL_URL: ws://127.0.0.1:8000
      SURREAL_NS: langgraph
      SURREAL_DB: checkpoint
      SURREAL_USER: root
      SURREAL_PASS: secret
    services:
      surrealdb:
        image: docker.io/surrealdb/surrealdb:latest
        ports:
          - 8000:8000
        command: start
        env:
          SURREAL_PATH: rocksdb:/tmp/surreal.db
          SURREAL_USER: ${{ env.SURREAL_USER }}
          SURREAL_PASS: ${{ env.SURREAL_PASS }}
          DEFAULT_NAMESPACE: ${{ env.SURREAL_NS }}
          DEFAULT_DATABASE: ${{ env.SURREAL_DB }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Wait for SurrealDB
        shell: bash
        run: |
          set -o pipefail
          for attempt in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:8000/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "SurrealDB did not become healthy in time."
          docker logs "${{ job.services.surrealdb.id }}" || true
          exit 1
      - name: Run tests
        shell: bash
        run: uv run pytest -q
