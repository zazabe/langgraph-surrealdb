name: ci

on:
  push:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Run linting
        run: |
          uv sync --frozen
          uv run black --fast --check .
          uv run ruff check .
          uv run ty check .

  test:
    name: LangGraph Checkpoint SurrealDB tests
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      TEST_SURREAL_HOST: 127.0.0.1
      TEST_SURREAL_PORT: 8000
      TEST_SURREAL_NAMESPACE: test_ns
      TEST_SURREAL_DATABASE: test_db
      TEST_SURREAL_USERNAME: root
      TEST_SURREAL_PASSWORD: secret
    services:
      surrealdb:
        image: docker.io/surrealdb/surrealdb:latest
        ports:
          - 8000:8000
        command: start
        env:
          SURREAL_USER: ${{ env.TEST_SURREAL_USERNAME }}
          SURREAL_PASS: ${{ env.TEST_SURREAL_PASSWORD }}
          SURREAL_PATH: rocksdb:/tmp/test.db
          DEFAULT_NAMESPACE: ${{ env.TEST_SURREAL_NAMESPACE }}
          DEFAULT_DATABASE: ${{ env.TEST_SURREAL_DATABASE }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Wait for SurrealDB
        shell: bash
        run: |
          set -o pipefail
          for attempt in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:8000/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "SurrealDB did not become healthy in time."
          docker logs "${{ job.services.surrealdb.id }}" || true
          exit 1
      - name: Setup SurrealDB
        shell: bash
        run: |
          uv sync --frozen
          uv run python - <<EOF
          from surrealdb import Surreal

          db = Surreal(f"ws://${{ env.TEST_SURREAL_HOST }}:${{ env.TEST_SURREAL_PORT }}")
          db.use("${{ env.TEST_SURREAL_NAMESPACE }}", "${{ env.TEST_SURREAL_DATABASE }}")
          db.signin({
            "username": "${{ env.TEST_SURREAL_USERNAME }}",
            "password": "${{ env.TEST_SURREAL_PASSWORD }}",
          })
          db.query("DEFINE TABLE IF NOT EXISTS checkpoint SCHEMALESS")
          db.query("DEFINE TABLE IF NOT EXISTS `write` SCHEMALESS")
          db.close()
          EOF
      - name: Run tests
        shell: bash
        run: uv run pytest -q
